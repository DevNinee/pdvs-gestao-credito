<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar da Preta — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 340px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-title {
      font-size: 16px;
      font-weight: 700;
      color: #f0f0f0;
    }

    .login-sub {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .login-erro {
      font-size: 12px;
      color: #fca5a5;
      min-height: 14px;
    }

    .login-btn {
      width: 100%;
      padding: 10px 14px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <form class="login-card" id="form-login">
      <div>
        <div class="login-title">Bar da Preta</div>
        <div class="login-sub">Entre com a senha de acesso ao PDV</div>
      </div>

      <div class="field-group">
        <label class="field-label">Senha</label>
        <input type="password" class="field-input" id="campo-senha" autocomplete="current-password" autofocus required>
      </div>

      <div class="login-erro" id="login-erro"></div>

      <button type="submit" class="btn-primary login-btn">Entrar</button>
    </form>
  </div>

  <script src="js/login.js"></script>
</body>

</html>
